# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "AWS-Infrastructure" ]
  pull_request:
    branches: [ "AWS-Infrastructure" ]

jobs:
  build:

    runs-on: self-hosted
    permissions: 
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
  
    - name: calculate version
      id: calculate-version
      uses: bitshifted/git-auto-semver@v2
      with:
        main_branch: master
        create_tag: true

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn -B package --file pom.xml
    
    - name: Build image
      uses: docker/build-push-action@v2
      with:
        push: false
        tags: "${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
        context: .
      env:
        #ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: java-hello-world
        IMAGE_TAG: ${{ steps.calculate-version.outputs.version-string }}

    - name: Push to ECR
      id: ecr
      uses: jwalton/gh-ecr-push@v2
      with:
        region: us-east-1
        local-image: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        image: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}, ${{ env.ECR_REPOSITORY }}:latest
      env:
        #ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: java-hello-world
        IMAGE_TAG: ${{ steps.calculate-version.outputs.version-string }}
        
    # Deploy from ECR and verify running
  deploy:  

    runs-on: self-hosted
    needs: build
    
    steps:
    - name: Pull from ECR
      id: ecr
      uses: jwalton/gh-ecr-push@v2
      with:
        region: us-east-1
        image:  ${{ env.ECR_REPOSITORY }}:latest
        local-image: my-image
        direction: pull
      env:
        #ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: java-hello-world

    - name: Run Docker Container 
      run: docker run my-image

    - name: Test
      run: |
        if [[ -z $(docker logs my-image) ]]; then return 1; fi
      
