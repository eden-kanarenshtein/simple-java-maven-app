# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions: 
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Automatic Semantic Versioning
      id: version # ID to reference the action's outputs
      uses: "phips28/gh-action-semantic-versioning@main"
      with:
        main_branch: "master" # Specifies the main branch
        initial_version: "1.0.0" # Sets the starting version
        create_tag: true # Creates a git tag for the new version
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build image
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_REPO }}:${{ steps.version.outputs.new_version }}"
        context: .
      env:
        DOCKER_REPO: "java-hello-world"
